<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeldTable Pro v1.4</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --s1: #0d1117; --s2: #161b22; --bdr: #30363d;
            --blue: #00d2ff; --blue-glow: rgba(0, 210, 255, 0.3);
            --amber: #f59e0b; --green: #2ecc71; --red: #e74c3c;
            --t1: #f0f6fc; --t2: #8b949e;
            --head: 'Rajdhani', sans-serif;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t1); font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; padding-bottom: 90px; }
        
        .hdr { background: var(--s1); border-bottom: 1px solid var(--bdr); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .hdr-title { font-family: var(--head); font-size: 20px; font-weight: 700; color: var(--blue); text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        
        /* Navigatie */
        .bnav { position: fixed; bottom: 0; width: 100%; background: var(--s1); border-top: 1px solid var(--bdr); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .bn { background: none; border: none; color: var(--t2); font-family: var(--head); font-size: 10px; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .bn.on { color: var(--blue); text-shadow: 0 0 8px var(--blue-glow); }
        .bn-special { background: var(--blue); color: #000; border-radius: 50%; width: 55px; height: 55px; margin-top: -30px; border: 5px solid var(--bg); box-shadow: 0 0 15px var(--blue-glow); font-size: 24px; display: flex; align-items: center; justify-content: center; }

        .pg { display: none; padding: 20px 15px; }
        .pg.on { display: block; }

        /* Formulier & Kaarten */
        .card { background: var(--s1); border: 1px solid var(--bdr); border-radius: 14px; padding: 18px; margin-bottom: 15px; }
        .fld { margin-bottom: 12px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: var(--t2); margin-bottom: 4px; font-weight: 600; }
        input, select { width: 100%; background: var(--s2); border: 1px solid var(--bdr); color: var(--t1); padding: 12px; border-radius: 10px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--blue); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Heat Input Gauge */
        .gauge-wrap { background: var(--s2); padding: 15px; border-radius: 12px; border: 1px solid var(--bdr); margin: 15px 0; }
        .gauge-bar { height: 14px; background: #222; border-radius: 7px; position: relative; overflow: hidden; margin: 10px 0; border: 1px solid #333; }
        .gauge-fill { height: 100%; width: 0%; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .marker { position: absolute; top: 0; bottom: 0; width: 2px; background: #fff; z-index: 5; }

        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-family: var(--head); font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .btn-primary { background: var(--blue); color: #000; box-shadow: 0 4px 10px var(--blue-glow); }
        .btn-outline { background: transparent; border: 1px solid var(--blue); color: var(--blue); }
    </style>
</head>
<body>

    <header class="hdr">
        <div class="hdr-title">⚡ WeldTable Pro</div>
        <div style="font-size: 10px; color: var(--t2);">v1.4 - GitHub Live</div>
    </header>

    <div id="pg-zoek" class="pg on">
        <h3 style="font-family: var(--head); color: var(--blue);">Zoeken op Parameters</h3>
        <div class="card">
            <div class="fld"><label>Merk Lasrobot</label><input type="text" id="q-merk" placeholder="Bijv. Panasonic"></div>
            <div class="grid-2">
                <div class="fld"><label>Lasproces</label><select id="q-proc"><option value="">Alle</option><option>MIG/MAG</option><option>TIG</option></select></div>
                <div class="fld"><label>Las Positie</label><input type="text" id="q-pos" placeholder="PA / PB"></div>
            </div>
            <div class="fld"><label>Las Type</label><input type="text" id="q-type" placeholder="Hoeklas / V-naad"></div>
            
            <div class="grid-2">
                <div class="fld"><label>Materiaal 1</label><select id="q-m1"><option value="">Alle</option><option>S235</option><option>S355</option><option>S700</option><option>RVS 304</option></select></div>
                <div class="fld"><label>Dikte 1 (mm)</label><input type="number" id="q-d1"></div>
            </div>
            <div class="grid-2">
                <div class="fld"><label>Materiaal 2</label><select id="q-m2"><option value="">Alle</option><option>S235</option><option>S355</option><option>S700</option></select></div>
                <div class="fld"><label>Dikte 2 (mm)</label><input type="number" id="q-d2"></div>
            </div>
            <div class="grid-2">
                <div class="fld"><label>A-Hoogte</label><input type="text" id="q-a" placeholder="a5"></div>
                <div class="fld"><label>Toevoeg Materiaal</label><input type="text" id="q-toev" placeholder="Soort/Dikte"></div>
            </div>
            <button class="btn btn-primary" onclick="searchWelds()">Zoek Lassen</button>
        </div>
        <div id="results"></div>
    </div>

    <div id="pg-nieuw" class="pg">
        <h3 style="font-family: var(--head);">Nieuwe Las Toevoegen</h3>
        
        <div class="gauge-wrap">
            <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: 600;">
                <span>Heat Input: <span id="hi-val" style="color:var(--blue)">0.00</span> kJ/mm</span>
                <span id="hi-status">STABIEAL</span>
            </div>
            <div class="gauge-bar">
                <div id="hi-fill" class="gauge-fill"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 9px; color: var(--t2);">
                <span>0.2 (Min)</span>
                <span>Optimaal (0.8 - 1.4)</span>
                <span>2.5 (Max)</span>
            </div>
        </div>

        <div class="card">
            <div class="grid-2">
                <div class="fld"><label>Materiaal Soort</label>
                    <select id="w-mat" onchange="calcHI()">
                        <option value="S235">S235</option>
                        <option value="S355">S355</option>
                        <option value="S460">S460</option>
                        <option value="S700">S700</option>
                        <option value="304">RVS 304</option>
                        <option value="316">RVS 316</option>
                    </select>
                </div>
                <div class="fld"><label>Robot</label><input type="text" id="w-robot"></div>
            </div>
            <div class="grid-2">
                <div class="fld"><label>Ampère</label><input type="number" id="w-amp" placeholder="220" oninput="calcHI()"></div>
                <div class="fld"><label>Volt</label><input type="number" id="w-volt" placeholder="24" oninput="calcHI()"></div>
            </div>
            <div class="grid-2">
                <div class="fld"><label>Snelheid (cm/min)</label><input type="number" id="w-speed" placeholder="45" oninput="calcHI()"></div>
                <div class="fld"><label>Therm. Factor</label><select id="w-k" onchange="calcHI()"><option value="0.8">MAG (0.8)</option><option value="0.6">TIG (0.6)</option></select></div>
            </div>
            <button class="btn btn-primary" onclick="saveWeld()">Opslaan in Database</button>
        </div>
    </div>

    <div id="pg-stats" class="pg">
        <h3 style="font-family: var(--head);">Mijn Database</h3>
        <div id="weld-list"></div>
    </div>

    <nav class="bnav">
        <button class="bn on" onclick="nav('zoek')">🔍<br>Zoek</button>
        <button class="bn bn-special" onclick="nav('nieuw')">+</button>
        <button class="bn" onclick="nav('stats')">📊<br>Stats</button>
    </nav>

    <script>
        const db = new Dexie("WeldTableDB");
        db.version(2).stores({ welds: '++id, merk, mat1, d1, aHoogte, hi' });

        function nav(p) {
            document.querySelectorAll('.pg').forEach(el => el.classList.remove('on'));
            document.querySelectorAll('.bn').forEach(el => el.classList.remove('on'));
            document.getElementById('pg-' + p).classList.add('on');
            event.currentTarget.classList.add('on');
        }

        function calcHI() {
            const a = parseFloat(document.getElementById('w-amp').value) || 0;
            const v = parseFloat(document.getElementById('w-volt').value) || 0;
            const s = parseFloat(document.getElementById('w-speed').value) || 0;
            const k = parseFloat(document.getElementById('w-k').value);
            
            if (a > 0 && v > 0 && s > 0) {
                // Formule: (A * V * 60) / (s * 1000) * k  --> s in mm/min
                // s is cm/min, dus * 10 voor mm/min
                const mmMin = s * 10;
                const hi = (a * v * 60) / (mmMin * 1000) * k;
                
                document.getElementById('hi-val').innerText = hi.toFixed(2);
                const fill = document.getElementById('hi-fill');
                const status = document.getElementById('hi-status');
                
                let percent = (hi / 2.5) * 100;
                fill.style.width = Math.min(percent, 100) + '%';

                // Kleur logica
                if (hi < 0.6 || hi > 1.8) {
                    fill.style.background = 'var(--red)';
                    status.innerText = "BUITEN BEREIK"; status.style.color = 'var(--red)';
                } else if ((hi >= 0.6 && hi < 0.8) || (hi > 1.4 && hi <= 1.8)) {
                    fill.style.background = 'var(--amber)';
                    status.innerText = "GRENSGEVAL"; status.style.color = 'var(--amber)';
                } else {
                    fill.style.background = 'var(--green)';
                    status.innerText = "OPTIMAAL"; status.style.color = 'var(--green)';
                }
            }
        }

        async function saveWeld() {
            const w = {
                merk: document.getElementById('w-robot').value,
                mat1: document.getElementById('w-mat').value,
                hi: document.getElementById('hi-val').innerText
            };
            await db.welds.add(w);
            alert("Las opgeslagen!");
            nav('stats');
            loadWelds();
        }

        async function loadWelds() {
            const all = await db.welds.toArray();
            document.getElementById('weld-list').innerHTML = all.map(w => `
                <div class="card" style="font-size:12px">
                    <b>${w.merk || 'Onbekend'}</b> - ${w.mat1}<br>
                    Heat Input: ${w.hi} kJ/mm
                </div>
            `).join('');
        }

        async function searchWelds() {
            const m = document.getElementById('q-m1').value;
            let results = await db.welds.toArray();
            if(m) results = results.filter(w => w.mat1 === m);
            
            document.getElementById('results').innerHTML = `<h4>Resultaten (${results.length})</h4>` + 
                results.map(w => `<div class="card">${w.merk} - ${w.mat1}</div>`).join('');
        }

        window.onload = loadWelds;
    </script>
</body>
</html>
