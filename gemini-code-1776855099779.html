<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeldTable Pro v1.5</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --s1: #0d1117; --s2: #161b22; --bdr: #30363d;
            --blue: #00d2ff; --blue-glow: rgba(0, 210, 255, 0.3);
            --amber: #f59e0b; --green: #2ecc71; --red: #e74c3c;
            --t1: #f0f6fc; --t2: #8b949e;
            --head: 'Rajdhani', sans-serif;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t1); font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; padding-bottom: 90px; }
        
        /* Login Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--s1); border: 1px solid var(--blue); padding: 30px; border-radius: 15px; width: 100%; max-width: 350px; box-shadow: 0 0 25px var(--blue-glow); }

        .hdr { background: var(--s1); border-bottom: 1px solid var(--bdr); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .hdr-title { font-family: var(--head); font-size: 18px; font-weight: 700; color: var(--blue); text-transform: uppercase; }
        
        .bnav { position: fixed; bottom: 0; width: 100%; background: var(--s1); border-top: 1px solid var(--bdr); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .bn { background: none; border: none; color: var(--t2); font-family: var(--head); font-size: 10px; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .bn.on { color: var(--blue); text-shadow: 0 0 8px var(--blue-glow); }
        .bn-special { background: var(--blue); color: #000; border-radius: 50%; width: 55px; height: 55px; margin-top: -30px; border: 5px solid var(--bg); box-shadow: 0 0 15px var(--blue-glow); font-size: 24px; display: flex; align-items: center; justify-content: center; }

        .pg { display: none; padding: 20px 15px; }
        .pg.on { display: block; }

        .card { background: var(--s1); border: 1px solid var(--bdr); border-radius: 14px; padding: 18px; margin-bottom: 15px; }
        .fld { margin-bottom: 12px; }
        label { display: block; font-size: 10px; text-transform: uppercase; color: var(--t2); margin-bottom: 4px; font-weight: 600; }
        input, select { width: 100%; background: var(--s2); border: 1px solid var(--bdr); color: var(--t1); padding: 12px; border-radius: 8px; font-size: 14px; outline: none; }
        
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-family: var(--head); font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--blue); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--blue); color: var(--blue); margin-bottom: 10px; }

        /* Heat Input Gauge Small */
        .hi-mini-gauge { height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-top: 5px; border: 1px solid #333; }
        .hi-fill { height: 100%; width: 0%; transition: 0.4s; }

        /* Wizard Helper */
        .wiz-step { display: none; }
        .wiz-step.on { display: block; }
        .step-dots { display: flex; gap: 5px; margin-bottom: 20px; }
        .dot { flex: 1; height: 4px; background: var(--bdr); border-radius: 2px; }
        .dot.on { background: var(--blue); }

        #install-btn { display: none; background: var(--amber); color: #000; font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="font-family: var(--head); color: var(--blue); text-align: center; margin-top: 0;">WeldTable Login</h2>
            <div class="fld"><label>Gebruikersnaam</label><input type="text" id="login-user" placeholder="Bijv. admin"></div>
            <button class="btn btn-primary" onclick="handleLogin()">Inloggen</button>
        </div>
    </div>

    <header class="hdr">
        <div class="hdr-title">WeldTable Pro</div>
        <button id="install-btn" onclick="installPWA()">APP INSTALLEREN</button>
    </header>

    <div id="pg-zoek" class="pg on">
        <h3 style="font-family: var(--head); color: var(--blue);">Parameters Zoeken</h3>
        <div class="card">
            <div class="fld"><label>Merk Lasrobot</label><input type="text" id="q-merk"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="fld"><label>Lasproces</label><select id="q-proc"><option value="">Alle</option><option>MIG/MAG</option><option>TIG</option></select></div>
                <div class="fld"><label>Positie</label><input type="text" id="q-pos" placeholder="PA/PB"></div>
            </div>
            <div class="fld"><label>Las Type</label><input type="text" id="q-type"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="fld"><label>Materiaal 1</label><input type="text" id="q-m1"></div>
                <div class="fld"><label>Dikte 1</label><input type="number" id="q-d1"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="fld"><label>Materiaal 2</label><input type="text" id="q-m2"></div>
                <div class="fld"><label>Dikte 2</label><input type="number" id="q-d2"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="fld"><label>A-Hoogte</label><input type="text" id="q-ah"></div>
                <div class="fld"><label>Gas</label><input type="text" id="q-gas"></div>
            </div>
            <div class="fld"><label>Toevoeg Materiaal (Soort/Dikte)</label><input type="text" id="q-toev"></div>
            <button class="btn btn-primary" onclick="doSearch()">Zoeken</button>
        </div>
        <div id="results"></div>
    </div>

    <div id="pg-nieuw" class="pg">
        <div class="step-dots">
            <div class="dot on" id="d1"></div>
            <div class="dot" id="d2"></div>
            <div class="dot" id="d3"></div>
        </div>

        <div id="w-s1" class="wiz-step on">
            <h3 style="font-family: var(--head);">Stap 1: Zichtbaarheid</h3>
            <div class="card">
                <p style="font-size: 13px; color: var(--t2);">Publieke lassen moeten door een beheerder gekeurd worden op basis van de EN-ISO 15614 norm.</p>
                <button class="btn btn-outline" onclick="setPrivacy('pub')">Publieke Las</button>
                <button class="btn btn-outline" onclick="setPrivacy('priv')">Privé Las</button>
            </div>
        </div>

        <div id="w-s2" class="wiz-step">
            <h3 style="font-family: var(--head);">Stap 2: Basis Gegevens</h3>
            <div class="card">
                <div class="fld"><label>Merk Robot</label><input type="text" id="in-robot"></div>
                <div class="fld"><label>Materiaal Soort</label>
                    <select id="in-mat">
                        <option>S235</option><option>S355</option><option>S460</option>
                        <option>S700</option><option>S960</option><option>RVS 304</option><option>RVS 316</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="fld"><label>A-Hoogte</label><input type="text" id="in-ah" placeholder="a5" onblur="formatA(this)"></div>
                    <div class="fld"><label>S-Waarde</label><input type="text" id="in-sw" placeholder="s7" onblur="formatS(this)"></div>
                </div>
                <div class="fld"><label>Aantal Lagen</label><input type="number" id="in-layers" value="1" min="1"></div>
                <button class="btn btn-primary" onclick="setupLayers()">Volgende: Lagen Invullen</button>
            </div>
        </div>

        <div id="w-s3" class="wiz-step">
            <h3 style="font-family: var(--head);">Stap 3: Parameters per Laag</h3>
            <div id="layer-container"></div>
            <button class="btn btn-primary" onclick="saveFullWeld()">Las definitief opslaan</button>
        </div>
    </div>

    <div id="pg-stats" class="pg">
        <h3 style="font-family: var(--head);">Mijn Database</h3>
        <div id="admin-wachtrij" style="display:none">
            <h4 style="color:var(--amber)">Beheer: Keuringswachtrij</h4>
            <div id="pending-list" class="card">Geen nieuwe keuringen.</div>
        </div>
        <div id="my-welds"></div>
    </div>

    <nav class="bnav">
        <button class="bn on" onclick="nav('zoek')">🔍<br>Zoek</button>
        <button class="bn bn-special" onclick="nav('nieuw')">+</button>
        <button class="bn" onclick="nav('stats')">📊<br>Stats</button>
    </nav>

    <script>
        const db = new Dexie("WeldTableV15");
        db.version(1).stores({ welds: '++id, merk, mat, aH, privacy, status' });

        let currentPrivacy = 'priv';
        let deferredPrompt;

        // PWA Installatie Logica
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').style.display = 'block';
        });

        function installPWA() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
                if (choice.outcome === 'accepted') document.getElementById('install-btn').style.display = 'none';
                deferredPrompt = null;
            });
        }

        function handleLogin() {
            const u = document.getElementById('login-user').value;
            if(u.toLowerCase() === 'admin') document.getElementById('admin-wachtrij').style.display = 'block';
            document.getElementById('auth-screen').style.display = 'none';
        }

        function nav(p) {
            document.querySelectorAll('.pg').forEach(el => el.classList.remove('on'));
            document.querySelectorAll('.bn').forEach(el => el.classList.remove('on'));
            document.getElementById('pg-' + p).classList.add('on');
            event.currentTarget.classList.add('on');
        }

        function formatA(el){ if(el.value && !el.value.startsWith('a')) el.value = 'a' + el.value; }
        function formatS(el){ if(el.value && !el.value.startsWith('s')) el.value = 's' + el.value; }

        function setPrivacy(p) {
            currentPrivacy = p;
            document.getElementById('w-s1').classList.remove('on');
            document.getElementById('w-s2').classList.add('on');
            document.getElementById('d2').classList.add('on');
        }

        function setupLayers() {
            const num = parseInt(document.getElementById('in-layers').value);
            const container = document.getElementById('layer-container');
            container.innerHTML = '';
            
            for(let i=1; i<=num; i++) {
                container.innerHTML += `
                    <div class="card" id="layer-card-${i}">
                        <h4 style="margin:0 0 10px 0; color:var(--blue)">Laag ${i}</h4>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            <div class="fld"><label>Ampère</label><input type="number" class="l-amp" oninput="liveHI(${i})"></div>
                            <div class="fld"><label>Volt</label><input type="number" class="l-volt" oninput="liveHI(${i})"></div>
                        </div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            <div class="fld"><label>m/min (Snelheid)</label><input type="number" step="0.01" class="l-speed" oninput="liveHI(${i})"></div>
                            <div class="fld"><label>Proces factor</label><select class="l-k" onchange="liveHI(${i})"><option value="0.8">MAG (0.8)</option><option value="0.6">TIG (0.6)</option></select></div>
                        </div>
                        <div style="font-size:11px;">HI: <span class="hi-val" id="hi-val-${i}">0.00</span> kJ/mm</div>
                        <div class="hi-mini-gauge"><div class="hi-fill" id="hi-fill-${i}"></div></div>
                    </div>
                `;
            }
            document.getElementById('w-s2').classList.remove('on');
            document.getElementById('w-s3').classList.add('on');
            document.getElementById('d3').classList.add('on');
        }

        function liveHI(idx) {
            const card = document.getElementById(`layer-card-${idx}`);
            const a = parseFloat(card.querySelector('.l-amp').value) || 0;
            const v = parseFloat(card.querySelector('.l-volt').value) || 0;
            const s = parseFloat(card.querySelector('.l-speed').value) || 0;
            const k = parseFloat(card.querySelector('.l-k').value);
            
            if(a > 0 && v > 0 && s > 0) {
                // Formule: (A * V * 0.00006 * k) / (s in m/min) is NIET handig.
                // Makkelijker: kJ/mm = (A * V * 60) / (s_in_mm_min * 1000) * k
                // s in m/min -> s * 1000 = mm/min.
                const hi = (a * v * 60) / (s * 1000 * 1000) * k * 1000; // Vereenvoudigd naar kJ/mm
                const result = (a * v * 0.06 * k) / (s * 100); // Correcte formule voor m/min naar kJ/mm
                
                document.getElementById(`hi-val-${idx}`).innerText = result.toFixed(2);
                const fill = document.getElementById(`hi-fill-${idx}`);
                let perc = (result / 2.0) * 100;
                fill.style.width = Math.min(perc, 100) + '%';
                
                if(result < 0.6 || result > 1.6) fill.style.background = 'var(--red)';
                else if(result < 0.8 || result > 1.4) fill.style.background = 'var(--amber)';
                else fill.style.background = 'var(--green)';
            }
        }

        async function saveFullWeld() {
            const weld = {
                merk: document.getElementById('in-robot').value,
                mat: document.getElementById('in-mat').value,
                aH: document.getElementById('in-ah').value,
                privacy: currentPrivacy,
                status: currentPrivacy === 'pub' ? 'pending' : 'approved',
                ts: Date.now()
            };
            await db.welds.add(weld);
            alert("Las succesvol opgeslagen!");
            location.reload();
        }

        // Dummy zoekfunctie
        async function doSearch() {
            const results = await db.welds.toArray();
            document.getElementById('results').innerHTML = results.map(w => `
                <div class="card">
                    <b>${w.merk}</b> - ${w.mat} (${w.aH})<br>
                    <small>Status: ${w.status}</small>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
