<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeldTable Pro v1.9</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --s1: #0d1117; --s2: #161b22; --bdr: #30363d;
            --blue: #00d2ff; --blue-glow: rgba(0, 210, 255, 0.4);
            --amber: #f59e0b; --green: #2ecc71; --red: #e74c3c;
            --t1: #f0f6fc; --t2: #8b949e;
            --head: 'Rajdhani', sans-serif;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--t1); margin: 0; padding-bottom: 90px; overflow: hidden; height: 100vh; }
        
        /* AUTH SYSTEM STYLING */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--s1); border: 1px solid var(--blue); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 0 30px var(--blue-glow); text-align: center; }
        
        .hdr { background: var(--s1); border-bottom: 1px solid var(--bdr); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; }
        .hdr-title { font-family: var(--head); font-size: 18px; font-weight: 700; color: var(--blue); text-transform: uppercase; }

        .fld { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 10px; text-transform: uppercase; color: var(--t2); margin-bottom: 4px; font-weight: 700; }
        input, textarea { width: 100%; background: var(--s2); border: 1px solid var(--bdr); color: var(--t1); padding: 12px; border-radius: 8px; font-size: 14px; outline: none; }
        
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-family: var(--head); font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--blue); color: #000; margin-top: 10px; }
        .btn-link { background: none; color: var(--blue); text-decoration: underline; font-size: 12px; margin-top: 15px; }

        .pg { display: none; padding: 15px; height: calc(100vh - 150px); overflow-y: auto; }
        .pg.on { display: block; }
        
        .hidden { display: none !important; }

        /* BNAV */
        .bnav { position: fixed; bottom: 0; width: 100%; background: var(--s1); border-top: 1px solid var(--bdr); display: flex; justify-content: space-around; padding: 10px 0; }
        .bn { background: none; border: none; color: var(--t2); font-size: 10px; display: flex; flex-direction: column; align-items: center; text-transform: uppercase; font-family: var(--head); }
        .bn.on { color: var(--blue); }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div id="login-box" class="auth-card">
            <h2 style="font-family: var(--head); color: var(--blue);">WeldTable Pro</h2>
            <div class="fld"><label>Gebruikersnaam</label><input type="text" id="l-user" placeholder="Bart_Benjamin_@14"></div>
            <div class="fld"><label>Wachtwoord</label><input type="password" id="l-pass"></div>
            <button class="btn btn-primary" onclick="handleLogin()">Inloggen</button>
            <button class="btn btn-link" onclick="showAuth('reg')">Nieuw account registreren</button>
        </div>

        <div id="reg-box" class="auth-card hidden">
            <h2 style="font-family: var(--head); color: var(--blue);">Registreren</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                <div class="fld"><label>Gebruikersnaam</label><input type="text" id="r-user"></div>
                <div class="fld"><label>E-mail</label><input type="email" id="r-email"></div>
            </div>
            <div class="fld"><label>Wachtwoord</label><input type="password" id="r-pass"></div>
            <div class="fld"><label>Bedrijfsnaam</label><input type="text" id="r-comp"></div>
            <div class="fld"><label>Bedrijfs Adres</label><textarea id="r-addr" rows="2"></textarea></div>
            <button class="btn btn-primary" onclick="handleRegister()">Account Aanmaken</button>
            <button class="btn btn-link" onclick="showAuth('login')">Terug naar login</button>
        </div>

        <div id="verify-box" class="auth-card hidden">
            <h2 style="font-family: var(--head); color: var(--amber);">Controleer je Mail</h2>
            <p style="font-size: 13px; color: var(--t2);">Er is een verificatie-link gestuurd naar jouw e-mailadres.</p>
            <div style="background: var(--s2); padding: 15px; border-radius: 10px; border: 1px dashed var(--amber); margin: 20px 0;">
                <p style="font-size: 11px; margin-bottom: 10px;">(Simulatie van e-mail knop)</p>
                <button class="btn btn-primary" style="background: var(--green);" onclick="completeVerification()">Bevestig Verificatie</button>
            </div>
        </div>
    </div>

    <header class="hdr">
        <div class="hdr-title">WeldTable Pro</div>
        <div id="user-display" style="font-size:10px; color:var(--amber)"></div>
    </header>

    <div id="pg-zoek" class="pg on">
        <h3 style="font-family: var(--head)">Zoeken</h3>
        </div>

    <div id="pg-nieuw" class="pg">
        <h3 style="font-family: var(--head)">Nieuwe Las</h3>
    </div>

    <nav class="bnav">
        <button class="bn on" onclick="nav('zoek')">🔍<br>Zoek</button>
        <button class="bn" onclick="nav('nieuw')">➕<br>Nieuw</button>
        <button class="bn" onclick="logout()">🚪<br>Uitloggen</button>
    </nav>

    <script>
        const db = new Dexie("WeldTable_v19");
        db.version(1).stores({
            users: 'user, pass, email, verified',
            welds: '++id, user, mat'
        });

        // Voorinstelling: Bart_Benjamin_@14
        async function setupAdmin() {
            const adminExists = await db.users.get('Bart_Benjamin_@14');
            if(!adminExists) {
                await db.users.put({
                    user: 'Bart_Benjamin_@14',
                    pass: '3QkNo@67',
                    email: 'admin@weldtable.pro',
                    verified: true
                });
            }
        }
        setupAdmin();

        // Check sessie bij opstarten
        window.onload = () => {
            const sessionUser = sessionStorage.getItem('activeUser');
            if(sessionUser) {
                loginSuccess(sessionUser);
            }
        };

        function showAuth(mode) {
            document.getElementById('login-box').classList.toggle('hidden', mode !== 'login');
            document.getElementById('reg-box').classList.toggle('hidden', mode !== 'reg');
            document.getElementById('verify-box').classList.toggle('hidden', mode !== 'verify');
        }

        async function handleLogin() {
            const u = document.getElementById('l-user').value;
            const p = document.getElementById('l-pass').value;
            
            const user = await db.users.get(u);
            if(user && user.pass === p) {
                if(!user.verified) return alert("E-mail nog niet geverifieerd!");
                sessionStorage.setItem('activeUser', u);
                loginSuccess(u);
            } else {
                alert("Ongeldige inloggegevens.");
            }
        }

        let tempUser = null;
        async function handleRegister() {
            const u = document.getElementById('r-user').value;
            const e = document.getElementById('r-email').value;
            const p = document.getElementById('r-pass').value;

            if(!u || !e || !p) return alert("Vul alle velden in.");

            await db.users.put({ user: u, email: e, pass: p, verified: false });
            tempUser = u;
            showAuth('verify');
        }

        async function completeVerification() {
            if(tempUser) {
                await db.users.update(tempUser, { verified: true });
                sessionStorage.setItem('activeUser', tempUser);
                loginSuccess(tempUser);
            }
        }

        function loginSuccess(username) {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('user-display').innerText = username;
            nav('zoek');
        }

        function logout() {
            sessionStorage.clear();
            location.reload();
        }

        function nav(p) {
            document.querySelectorAll('.pg').forEach(el => el.classList.remove('on'));
            document.getElementById('pg-' + p).classList.add('on');
        }
    </script>
</body>
</html>
