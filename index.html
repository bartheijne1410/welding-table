<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeldTable Pro v1.4</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --s1: #0d1117; --s2: #161b22; --bdr: #30363d;
            --blue: #00d2ff; --blue-glow: rgba(0, 210, 255, 0.3);
            --amber: #f59e0b; --green: #2ecc71; --red: #e74c3c;
            --t1: #f0f6fc; --t2: #8b949e;
            --head: 'Rajdhani', sans-serif;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t1); font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; padding-bottom: 80px; }
        
        .hdr { background: var(--s1); border-bottom: 1px solid var(--bdr); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .hdr-title { font-family: var(--head); font-size: 20px; font-weight: 700; color: var(--blue); text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        
        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--s1); border: 1px solid var(--blue); padding: 30px; border-radius: 15px; width: 100%; max-width: 350px; box-shadow: 0 0 20px var(--blue-glow); }

        /* Nav */
        .bnav { position: fixed; bottom: 0; width: 100%; background: var(--s1); border-top: 1px solid var(--bdr); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .bn { background: none; border: none; color: var(--t2); font-family: var(--head); font-size: 10px; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .bn.on { color: var(--blue); text-shadow: 0 0 8px var(--blue-glow); }
        .bn-special { background: var(--blue); color: #000; border-radius: 50%; width: 55px; height: 55px; margin-top: -30px; border: 5px solid var(--bg); box-shadow: 0 0 15px var(--blue-glow); font-size: 24px; display: flex; align-items: center; justify-content: center; }

        .pg { display: none; padding: 20px 15px; }
        .pg.on { display: block; }

        /* Wizard */
        .step-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .step-seg { flex: 1; height: 4px; background: var(--bdr); border-radius: 2px; }
        .step-seg.active { background: var(--blue); }

        /* Gauge & Meter */
        .gauge-container { background: var(--s2); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--bdr); }
        .gauge-track { height: 12px; background: #222; border-radius: 6px; position: relative; overflow: hidden; margin-top: 10px; }
        .gauge-fill { height: 100%; width: 0%; transition: 0.3s; background: var(--green); }
        .gauge-fill.warning { background: var(--amber); }
        .gauge-fill.danger { background: var(--red); }

        /* Inputs */
        .card { background: var(--s1); border: 1px solid var(--bdr); border-radius: 14px; padding: 18px; margin-bottom: 15px; }
        .fld { margin-bottom: 15px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: var(--t2); margin-bottom: 6px; font-weight: 600; }
        input, select { width: 100%; background: var(--s2); border: 1px solid var(--bdr); color: var(--t1); padding: 14px; border-radius: 10px; font-size: 14px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-family: var(--head); font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .btn-primary { background: var(--blue); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--blue); color: var(--blue); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="font-family: var(--head); color: var(--blue); text-align: center;">WeldTable 1.4</h2>
            <input type="text" id="username" placeholder="Gebruikersnaam" style="margin-bottom: 15px;">
            <button class="btn btn-primary" onclick="doLogin()">Inloggen</button>
        </div>
    </div>

    <header class="hdr">
        <div class="hdr-title">⚡ WeldTable Pro</div>
        <div id="sync">🌐</div>
    </header>

    <div id="pg-zoek" class="pg on">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn btn-outline" id="btn-p-mode" onclick="setSearchMode('param')">Parameters</button>
            <button class="btn btn-outline" id="btn-l-mode" onclick="setSearchMode('las')">Lasnummer</button>
        </div>
        <div class="card">
            <div id="search-input-area">
                <label id="search-label">Kies Parameter</label>
                <select id="search-select">
                    <option>S235 - 5mm</option>
                    <option>S355 - 10mm</option>
                    <option>RVS - 3mm</option>
                </select>
            </div>
            <button class="btn btn-primary" style="margin-top:15px;" onclick="toggleFilters()">Extra Filters +</button>
            <div id="extra-filters" style="display:none; margin-top:15px; border-top:1px solid var(--bdr); padding-top:10px;">
                <label>Robotstation</label>
                <select><option>Station 1</option><option>Station 2</option></select>
            </div>
        </div>
    </div>

    <div id="pg-nieuw" class="pg">
        <div class="step-bar">
            <div class="step-seg active" id="seg1"></div>
            <div class="step-seg" id="seg2"></div>
            <div class="step-seg" id="seg3"></div>
        </div>

        <div id="step-1">
            <h3 style="font-family:var(--head)">Zichtbaarheid</h3>
            <button class="btn btn-outline" style="margin-bottom:10px" onclick="setWeldType('pub')">Publieke Las (Keuring nodig)</button>
            <button class="btn btn-outline" onclick="setWeldType('priv')">Privé Las</button>
        </div>

        <div id="step-2" style="display:none">
            <h3 style="font-family:var(--head)">Basis Gegevens</h3>
            <div class="fld"><label>Materiaalsoort</label>
                <select id="w-mat" onchange="updateGauge()"><option value="S235">S235 (Staal)</option><option value="S355">S355 (Staal)</option><option value="304">RVS 304</option></select>
            </div>
            <div class="fld"><label>A-Hoogte</label><input type="text" id="w-a" placeholder="10" onblur="formatInput(this,'a')"></div>
            <div class="fld"><label>S-Waarde</label><input type="text" id="w-s" placeholder="8" onblur="formatInput(this,'s')"></div>
            <button class="btn btn-primary" onclick="goStep(3)">Naar de Lagen</button>
        </div>

        <div id="step-3" style="display:none">
            <div class="gauge-container">
                <label>Live Heat Input: <span id="hi-val">0.00</span> kJ/mm</label>
                <div class="gauge-track"><div id="hi-fill" class="gauge-fill"></div></div>
                <small id="hi-msg" style="font-size:10px; color:var(--t2)">Berekening op basis van EN-ISO 15614</small>
            </div>
            <div class="card">
                <div class="fld"><label>Ampère</label><input type="number" id="l-a" oninput="updateGauge()"></div>
                <div class="fld"><label>Voltage</label><input type="number" id="l-v" oninput="updateGauge()"></div>
                <div class="fld"><label>Snelheid (m/min)</label><input type="number" id="l-speed" oninput="updateGauge()"></div>
                <div class="fld"><label>Proces</label><select id="l-proc" onchange="updateGauge()"><option value="0.8">MIG/MAG (0.8)</option><option value="0.6">TIG (0.6)</option></select></div>
            </div>
            <button class="btn btn-primary" onclick="saveWeld()">Las Opslaan</button>
        </div>
    </div>

    <div id="pg-stats" class="pg">
        <h2 style="font-family:var(--head)">Overzicht</h2>
        <div id="adm-panel" style="display:none">
            <div class="card" style="border-left: 4px solid var(--amber);">
                <h4 style="color:var(--amber); margin:0;">Beheerder: Wachtrij</h4>
                <p style="font-size:12px">Hier komen lassen die gekeurd moeten worden.</p>
            </div>
        </div>
        <div class="card"><h4>Mijn Lassen</h4><div id="user-welds-list">Nog geen lassen opgeslagen in v1.4</div></div>
    </div>

    <nav class="bnav">
        <button class="bn on" onclick="nav('zoek')">🔍<br>Zoek</button>
        <button class="bn bn-special" onclick="nav('nieuw')">+</button>
        <button class="bn" onclick="nav('stats')">📊<br>Stats</button>
    </nav>

    <script>
        const db = new Dexie("WeldTableV14");
        db.version(1).stores({ welds: '++id, mat, aVal, sVal, status, type' });

        function doLogin() {
            const u = document.getElementById('username').value;
            if(u.toLowerCase() === 'admin') document.getElementById('adm-panel').style.display = 'block';
            document.getElementById('auth-screen').style.display = 'none';
            migrateOldData();
        }

        function nav(p) {
            document.querySelectorAll('.pg').forEach(el => el.classList.remove('on'));
            document.querySelectorAll('.bn').forEach(el => el.classList.remove('on'));
            document.getElementById('pg-' + p).classList.add('on');
            event.currentTarget.classList.add('on');
        }

        function setSearchMode(mode) {
            const label = document.getElementById('search-label');
            const area = document.getElementById('search-input-area');
            if(mode === 'las') {
                area.innerHTML = '<label>Lasnummer</label><input type="text" placeholder="Bijv. WPS-2024-001">';
            } else {
                area.innerHTML = '<label>Kies Parameter</label><select><option>S235 - 5mm</option></select>';
            }
        }

        function toggleFilters() {
            const f = document.getElementById('extra-filters');
            f.style.display = f.style.display === 'none' ? 'block' : 'none';
        }

        function formatInput(el, prefix) {
            let v = el.value.toLowerCase().replace(prefix, '');
            if(v) el.value = prefix + v;
        }

        function goStep(n) {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('step-3').style.display = 'none';
            document.getElementById('step-' + n).style.display = 'block';
            document.getElementById('seg' + n).classList.add('active');
        }

        function setWeldType(t) { goStep(2); }

        function updateGauge() {
            const a = parseFloat(document.getElementById('l-a').value) || 0;
            const v = parseFloat(document.getElementById('l-v').value) || 0;
            const s = parseFloat(document.getElementById('l-speed').value) || 0;
            const k = parseFloat(document.getElementById('l-proc').value);
            
            if(a > 0 && v > 0 && s > 0) {
                const hi = (a * v * 0.06 * k) / s;
                document.getElementById('hi-val').innerText = hi.toFixed(2);
                const fill = document.getElementById('hi-fill');
                let percent = (hi / 2.5) * 100; // 2.5 kJ/mm als max referentie
                fill.style.width = Math.min(percent, 100) + '%';
                
                fill.className = 'gauge-fill';
                if(hi > 1.5) fill.classList.add('warning');
                if(hi > 2.0) fill.classList.add('danger');
            }
        }

        async function saveWeld() {
            await db.welds.add({
                mat: document.getElementById('w-mat').value,
                aVal: document.getElementById('w-a').value,
                sVal: document.getElementById('w-s').value,
                status: 'pending'
            });
            alert('Las opgeslagen! Indien publiek: wacht op keuring beheerder.');
            nav('stats');
        }

        function migrateOldData() {
            const oldData = localStorage.getItem('welds'); // De oude sleutel
            if(oldData) {
                const parsed = JSON.parse(oldData);
                parsed.forEach(w => db.welds.add(w));
                localStorage.removeItem('welds');
                console.log('Migratie voltooid!');
            }
        }
    </script>
</body>
</html>
