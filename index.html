<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeldTable Pro v1.6</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; --s1: #0d1117; --s2: #161b22; --bdr: #30363d;
            --blue: #00d2ff; --blue-glow: rgba(0, 210, 255, 0.3);
            --amber: #f59e0b; --green: #2ecc71; --red: #e74c3c;
            --t1: #f0f6fc; --t2: #8b949e;
            --head: 'Rajdhani', sans-serif;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t1); font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; padding-bottom: 90px; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .auth-card { background: var(--s1); border: 1px solid var(--blue); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 0 30px var(--blue-glow); }

        .hdr { background: var(--s1); border-bottom: 1px solid var(--bdr); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .hdr-title { font-family: var(--head); font-size: 18px; font-weight: 700; color: var(--blue); text-transform: uppercase; }
        
        .bnav { position: fixed; bottom: 0; width: 100%; background: var(--s1); border-top: 1px solid var(--bdr); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .bn { background: none; border: none; color: var(--t2); font-family: var(--head); font-size: 10px; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .bn.on { color: var(--blue); text-shadow: 0 0 8px var(--blue-glow); }
        .bn-special { background: var(--blue); color: #000; border-radius: 50%; width: 55px; height: 55px; margin-top: -30px; border: 5px solid var(--bg); box-shadow: 0 0 15px var(--blue-glow); font-size: 24px; display: flex; align-items: center; justify-content: center; }

        .pg { display: none; padding: 15px; }
        .pg.on { display: block; }

        .card { background: var(--s1); border: 1px solid var(--bdr); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .fld { margin-bottom: 12px; }
        .section-title { font-family: var(--head); color: var(--blue); border-bottom: 1px solid var(--bdr); padding-bottom: 5px; margin: 15px 0 10px 0; font-size: 14px; text-transform: uppercase; }
        
        label { display: block; font-size: 9px; text-transform: uppercase; color: var(--t2); margin-bottom: 4px; font-weight: 700; }
        input, select { width: 100%; background: var(--s2); border: 1px solid var(--bdr); color: var(--t1); padding: 10px; border-radius: 8px; font-size: 13px; outline: none; }
        
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-family: var(--head); font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .btn-primary { background: var(--blue); color: #000; margin-top: 10px; }
        .btn-ghost { background: transparent; color: var(--t2); font-size: 11px; margin-top: 10px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .hi-fill { height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .hi-bar { height: 100%; width: 0%; transition: 0.4s; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card" id="login-box">
            <h2 style="font-family: var(--head); color: var(--blue); margin-top:0">Welkom Terug</h2>
            <div class="fld"><label>Gebruikersnaam</label><input type="text" id="l-user"></div>
            <div class="fld"><label>Wachtwoord</label><input type="password" id="l-pass"></div>
            <button class="btn btn-primary" onclick="doAuth('login')">Inloggen</button>
            <button class="btn btn-ghost" onclick="toggleAuth(true)">Nog geen account? Registreer hier</button>
        </div>

        <div class="auth-card hidden" id="reg-box">
            <h2 style="font-family: var(--head); color: var(--blue); margin-top:0">Registreren</h2>
            <div class="fld"><label>Bedrijfsnaam</label><input type="text" id="r-comp"></div>
            <div class="fld"><label>E-mail</label><input type="email" id="r-email"></div>
            <div class="grid-2">
                <div class="fld"><label>Gebruikersnaam</label><input type="text" id="r-user"></div>
                <div class="fld"><label>Wachtwoord</label><input type="password" id="r-pass"></div>
            </div>
            <button class="btn btn-primary" onclick="doAuth('reg')">Account Aanmaken</button>
            <button class="btn btn-ghost" onclick="toggleAuth(false)">Al een account? Log in</button>
        </div>
    </div>

    <header class="hdr">
        <div class="hdr-title">WeldTable Pro <span style="font-size: 10px; opacity: 0.5;">v1.6</span></div>
        <div id="user-tag" style="font-size: 10px; color: var(--blue);"></div>
    </header>

    <div id="pg-zoek" class="pg on">
        <div class="grid-2" style="margin-bottom:15px">
            <button class="btn btn-primary" onclick="setSearchMode('param')">Op Parameters</button>
            <button class="btn btn-outline" id="btn-mode-las" onclick="setSearchMode('las')">Op Lasnummer</button>
        </div>

        <div id="search-param-ui" class="card">
            <label>Basis Parameters</label>
            <div class="fld"><label>Robot</label><input type="text" id="q-robot"></div>
            <div class="grid-2">
                <div class="fld"><label>Materiaal</label><input type="text" id="q-mat"></div>
                <div class="fld"><label>A-Hoogte</label><input type="text" id="q-ah"></div>
            </div>
            <button class="btn btn-primary" onclick="runSearch()">Zoek Lassen</button>
        </div>

        <div id="search-las-ui" class="card hidden">
            <label>Lasnummer / WPS ID</label>
            <input type="text" id="q-lasnummer" placeholder="Bijv. WPS-S355-101">
            <button class="btn btn-primary" style="margin-top:10px">Zoek op nummer</button>
        </div>
        <div id="search-results"></div>
    </div>

    <div id="pg-nieuw" class="pg">
        <div id="s1" class="card">
            <h3 style="font-family:var(--head); margin-top:0">Zichtbaarheid</h3>
            <div class="grid-2">
                <button class="btn btn-outline" onclick="next(2, 'pub')">Publiek</button>
                <button class="btn btn-outline" onclick="next(2, 'priv')">Privé</button>
            </div>
        </div>

        <div id="s2" class="card hidden">
            <h3 style="font-family:var(--head); margin-top:0">Stap 2: Verbinding</h3>
            <div class="grid-2">
                <div class="fld"><label>Materiaal 1</label>
                    <select id="m1" onchange="calcLimits()"><option>S235</option><option>S355</option><option>S700</option><option>RVS 304</option></select>
                </div>
                <div class="fld"><label>Materiaal 2</label>
                    <select id="m2" onchange="calcLimits()"><option>S235</option><option>S355</option><option>S700</option><option>RVS 304</option></select>
                </div>
            </div>
            <div class="grid-2">
                <div class="fld"><label>Dikte 1 (mm)</label><input type="number" id="d1"></div>
                <div class="fld"><label>Dikte 2 (mm)</label><input type="number" id="d2"></div>
            </div>
            <button class="btn btn-primary" onclick="next(3)">Naar Parameters</button>
        </div>

        <div id="s3" class="hidden">
            <div class="card" style="position: sticky; top: 60px; z-index: 10; background: var(--s1);">
                <label>Live Heat Input Check (m/min)</label>
                <div id="hi-display" style="font-size: 18px; font-weight: 700;">0.00 kJ/mm</div>
                <div class="hi-fill"><div id="hi-bar" class="hi-bar"></div></div>
            </div>

            <div class="card">
                <div class="section-title">Geometrie & Naad</div>
                <div class="fld"><label>Type Lasnaad</label>
                    <select id="naad-type" onchange="toggleNaadFields()">
                        <option value="hoek">Hoeklas</option>
                        <option value="v">V-Naad</option>
                        <option value="k">K-Naad</option>
                        <option value="i">I-Naad</option>
                    </select>
                </div>
                <div id="naad-extra" class="hidden">
                    <div class="grid-2">
                        <div class="fld"><label>Afschuinhoek 1</label><input type="number"></div>
                        <div class="fld"><label>Afschuinhoek 2</label><input type="number"></div>
                    </div>
                    <div class="grid-2">
                        <div class="fld"><label>Neushoogte 1</label><input type="number"></div>
                        <div class="fld"><label>Neushoogte 2</label><input type="number"></div>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="fld"><label>Doorlassing</label><select><option>Nee</option><option>Ja</option></select></div>
                    <div class="fld"><label>Spleet/Opening</label><select id="spleet-chk" onchange="document.getElementById('spleet-input').classList.toggle('hidden')"><option>Nee</option><option>Ja</option></select></div>
                </div>
                <div id="spleet-input" class="fld hidden"><label>Hoeveelheid (mm)</label><input type="number"></div>

                <div class="section-title">Elektrisch & Robot</div>
                <div class="grid-2">
                    <div class="fld"><label>Ampère</label><input type="number" id="in-a" oninput="liveHI()"></div>
                    <div class="fld"><label>Volt</label><input type="number" id="in-v" oninput="liveHI()"></div>
                </div>
                <div class="grid-2">
                    <div class="fld"><label>Snelheid (m/min)</label><input type="number" id="in
