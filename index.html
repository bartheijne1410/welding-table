<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeldTable Pro v1.4</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a14">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a14; --s1: #111120; --s2: #181828; --bdr: #22223a;
            --amber: #f59e0b; --blue: #38bdf8; --green: #34d399; --red: #ef4444;
            --t1: #ffffff; --t2: #94a3b8;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--t1); overflow-x: hidden; }
        
        /* Auth Overlay */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--s1); padding: 30px; border-radius: 12px; border: 1px solid var(--bdr); width: 100%; max-width: 350px; text-align: center; }

        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--s1); border-top: 1px solid var(--bdr); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { color: var(--t2); text-decoration: none; font-size: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--blue); }
        .nav-item.special { color: var(--amber); font-weight: bold; }

        /* Steps & Forms */
        .tab-content { display: none; padding: 20px; padding-bottom: 80px; }
        .tab-content.active { display: block; }
        .form-step { display: none; animation: fadeIn 0.3s; }
        .form-step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, select, textarea { width: 100%; background: var(--s2); border: 1px solid var(--bdr); color: white; padding: 12px; border-radius: 6px; margin: 8px 0; box-sizing: border-box; font-family: inherit; }
        .btn { padding: 12px 20px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--blue); color: #000; }
        .btn-amber { background: var(--amber); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--bdr); color: var(--t1); }

        .layer-block { background: var(--s1); border: 1px solid var(--bdr); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .hi-bad { color: var(--red); font-weight: bold; }
        .hi-good { color: var(--green); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        h2 { font-family: 'Rajdhani', sans-serif; color: var(--amber); }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="font-family:'Rajdhani'">WeldTable <span style="color:var(--amber)">v1.4</span></h1>
            <input type="text" id="login-user" placeholder="Gebruikersnaam">
            <input type="password" id="login-pass" placeholder="Wachtwoord">
            <button class="btn btn-primary" onclick="login()">Inloggen</button>
            <p style="font-size:12px; color:var(--t2); margin-top:15px;">Nog geen account? <a href="#" style="color:var(--blue)">Registreer</a></p>
        </div>
    </div>

    <!-- TAB 1: ZOEKEN -->
    <div id="tab-1" class="tab-content active">
        <h2>Zoeken</h2>
        <input type="text" id="search-nr" placeholder="Zoek op Lasnummer..." oninput="search()">
        <details style="margin-top:10px;">
            <summary style="color:var(--blue); cursor:pointer; font-size:14px;">+ Extra Parameters Filters</summary>
            <div style="padding-top:10px;">
                <select id="f-robot"><option value="">Alle Robots</option><option>Panasonic</option><option>KUKA</option></select>
                <input type="text" placeholder="Materiaal...">
                <input type="text" placeholder="Type lasnaad...">
            </div>
        </details>
        <div id="results-list" style="margin-top:20px;"></div>
    </div>

    <!-- TAB 2: NIEUWE LAS (ORANJE) -->
    <div id="tab-2" class="tab-content">
        <div id="step-1" class="form-step active">
            <h2>Stap 1: Zichtbaarheid</h2>
            <button class="btn btn-primary" onclick="goStep(2, 'publiek')">Publiek (Zichtbaar voor iedereen)</button>
            <button class="btn btn-outline" onclick="goStep(2, 'prive')">Privé (Alleen voor mij)</button>
        </div>

        <div id="step-2" class="form-step">
            <h2>Stap 2: Configuratie</h2>
            <div class="grid-2">
                <input type="text" id="n-ahoogte" placeholder="a-hoogte (bijv 8)" onblur="formatVal(this, 'a')">
                <input type="text" id="n-swaarde" placeholder="s-waarde (bijv 10)" onblur="formatVal(this, 's')">
            </div>
            <input type="number" id="n-lagen" placeholder="Aantal lagen" min="1" value="1">
            <select id="n-robot">
                <option>Panasonic</option><option>KUKA</option><option>ABB</option>
            </select>
            <div class="grid-2">
                <input type="text" placeholder="Materiaal 1">
                <input type="text" placeholder="Dikte 1">
            </div>
            <button class="btn btn-amber" onclick="initLayers()">Naar Stap 3</button>
        </div>

        <div id="step-3" class="form-step">
            <h2>Stap 3: Lagen & Heat Input</h2>
            <div id="layers-box"></div>
            <button class="btn btn-primary" onclick="saveWeld()">Opslaan voor keuring</button>
        </div>
    </div>

    <!-- TAB 3: STATS -->
    <div id="tab-3" class="tab-content">
        <h2>Statistieken</h2>
        <div id="user-stats">
            <div class="layer-block">Goedkeuringsstatus: <span style="color:var(--amber)">1 lopend</span></div>
            <div id="admin-only" style="display:none;">
                <h3>Beheerder Overzicht</h3>
                <p>Lassen per merk: 45</p>
                <p>Lasprocessen: 12</p>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="showTab(1)"><span>🔍</span>Zoeken</div>
        <div class="nav-item special" onclick="showTab(2)"><span>➕</span>Nieuwe Las</div>
        <div class="nav-item" onclick="showTab(3)"><span>📊</span>Stats</div>
    </nav>

    <script>
        let currentUser = null;

        function login() {
            const user = document.getElementById('login-user').value;
            if(!user) return alert("Vul een naam in");
            currentUser = { name: user, role: user.toLowerCase() === 'admin' ? 'admin' : 'user' };
            document.getElementById('auth-overlay').style.display = 'none';
            if(currentUser.role === 'admin') document.getElementById('admin-only').style.display = 'block';
        }

        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+n).classList.add('active');
            document.querySelectorAll('.nav-item').forEach((item, idx) => {
                item.classList.toggle('active', idx + 1 === n);
            });
        }

        function goStep(n, priv) {
            document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
            document.getElementById('step-'+n).classList.add('active');
        }

        function formatVal(el, pre) {
            let v = el.value.trim().toLowerCase();
            if(v && !v.startsWith(pre)) el.value = pre + v;
        }

        function initLayers() {
            const n = document.getElementById('n-lagen').value;
            let h = '';
            for(let i=1; i<=n; i++) {
                h += `<div class="layer-block">
                    <h4>Laag ${i}</h4>
                    <div class="grid-2">
                        <input type="number" placeholder="Amp" oninput="calcHI(${i})" id="a-${i}">
                        <input type="number" placeholder="Volt" oninput="calcHI(${i})" id="v-${i}">
                    </div>
                    <input type="number" placeholder="Snelheid (cm/min)" oninput="calcHI(${i})" id="s-${i}">
                    <div id="hi-${i}" style="font-size:12px; margin-top:5px;">HI: -</div>
                    <textarea placeholder="Commando's voor/na..."></textarea>
                </div>`;
            }
            document.getElementById('layers-box').innerHTML = h;
            goStep(3);
        }

        function calcHI(i) {
            const a = document.getElementById('a-'+i).value;
            const v = document.getElementById('v-'+i).value;
            const s = document.getElementById('s-'+i).value;
            const res = document.getElementById('hi-'+i);
            if(a && v && s) {
                const hi = (a * v * 0.06) / s;
                const ok = hi > 0.5 && hi < 2.0; // Voorbeeld range
                res.innerHTML = `Heat Input: <span class="${ok?'hi-good':'hi-bad'}">${hi.toFixed(2)} kJ/mm</span>`;
            }
        }

        async function saveWeld() {
            const data = { id: Date.now(), user: currentUser.name };
            if(!navigator.onLine) {
                let list = JSON.parse(localStorage.getItem('offline_welds') || '[]');
                list.push(data);
                localStorage.setItem('offline_welds', JSON.stringify(list));
                alert("Offline opgeslagen! Synchroniseert zodra er internet is.");
            } else {
                alert("Verzonden naar beheerder voor keuring.");
            }
            showTab(1);
        }

        window.addEventListener('online', () => {
            const list = JSON.parse(localStorage.getItem('offline_welds') || '[]');
            if(list.length > 0) {
                console.log("Syncing...", list);
                localStorage.removeItem('offline_welds');
                alert("Offline data gesynchroniseerd!");
            }
        });
    </script>
</body>
</html>
